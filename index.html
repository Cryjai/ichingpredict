        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {

            color: #e9e6e0;
            padding: 1.5rem;
            min-height: 100vh;
        }

        /* 超型玻璃容器 */
        .glass-card {
            background: rgba(20, 20, 28, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 3rem;

            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(230, 200, 100, 0.1) inset;

        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #F5E7C8, #D4B87A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .sub {
            font-size: 0.8rem;
            color: #b9aa7e;
            font-family: monospace;
            letter-spacing: 1px;
        }

        /* 主卦區域 */
        .hexagram-master {
            padding: 1.6rem 1.8rem;
            margin-bottom: 2rem;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .symbol-badge {
            font-size: 4rem;
            text-align: center;
            font-family: monospace;
            margin-bottom: 0.5rem;
            letter-spacing: 8px;
            color: #FFE6B3;
        }
        .hex-name {
            text-align: center;
            font-size: 1.9rem;
            font-weight: 700;
            font-family: 'Noto Serif TC', serif;
            margin: 0.5rem 0 0.2rem;
        }
        .hex-sub {
            text-align: center;
            font-size: 1rem;
            color: #c9b27c;
            margin-bottom: 1.2rem;
            border-bottom: 1px dashed rgba(210, 180, 110, 0.4);
            display: inline-block;
            width: auto;
            padding-bottom: 6px;
        }
        .hex-judgment {
            background: rgba(0,0,0,0.4);
            padding: 0.8rem 1rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            font-style: italic;
            text-align: center;
            margin: 1rem 0;
            border-left: 4px solid #e4b363;
        }

            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin: 1.5rem 0;
            align-items: center;
        }
        .yao {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            font-family: monospace;
        }
        .line-group {
            display: flex;
            gap: 10px;
        }
        .yin-line {
            width: 48px;
            height: 4px;
            background: #cbbd91;
            border-radius: 4px;
            box-shadow: 0 0 2px #ffdd99;
        }
        .yang-line {
            width: 48px;
            height: 4px;
            background: #eccb7e;
            border-radius: 4px;
            box-shadow: 0 0 5px #f5bc70;
        }
        .line-label {
            font-size: 0.7rem;
            width: 24px;
            color: #aa9e7a;
        }

        /* 網格 */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.2rem 0;
        }
        .info-item {
            background: rgba(0,0,0,0.35);
            border-radius: 1.6rem;
            padding: 0.7rem 1rem;
            text-align: center;
        }
        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #bdaa7a;
        }
        .info-value {
            font-weight: 600;
            font-size: 1rem;
            margin-top: 4px;
        }

        .meaning-text {
            background: rgba(25, 20, 15, 0.7);
            border-radius: 2rem;
            padding: 1rem 1.3rem;
            margin: 1rem 0;
            font-size: 0.9rem;
            line-height: 1.5;
            border: 1px solid rgba(210, 180, 110, 0.3);
        }

            display: flex;
            gap: 1rem;
            margin-top: 1.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }

            border: none;
            background: rgba(230, 210, 150, 0.12);
            backdrop-filter: blur(8px);
            padding: 0.8rem 1.6rem;
            border-radius: 3rem;
            font-weight: 600;
            font-family: inherit;
            font-size: 0.9rem;
            color: #f0e2c5;

            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(210, 180, 110, 0.4);

            color: #14100a;
            font-weight: bold;

            color: #2a241a;
        }

            background: rgba(230, 210, 150, 0.25);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #ddbc84, #c79d4e);
            box-shadow: 0 8px 18px rgba(0,0,0,0.4);
        }
        .btn:active {
            transform: translateY(1px);
        }

        /* 複製toast */
        .toast-msg {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1f1b12e6;
            backdrop-filter: blur(12px);
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            color: #f7e5b5;
            font-weight: 500;
            font-size: 0.85rem;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            border: 1px solid #e6c67a;
            box-shadow: 0 4px 12px black;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .luck-effect {
            display: inline-block;
            background: #daa84e20;
            border-radius: 40px;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
        }

            margin-top: 3rem;
            text-align: center;
            font-size: 0.7rem;
            color: #6b624a;
            letter-spacing: 0.5px;
        }

        hr {
            border-color: #3e3624;
            margin: 1rem 0;
        }
        @media (max-width: 520px) {
            body { padding: 1rem; }
            .hex-name { font-size: 1.5rem; }
            .info-grid { grid-template-columns: 1fr; gap: 0.6rem; }

            100% { text-shadow: 0 0 0px; background-color: rgba(255,200,80,0);}

    const rawHexagrams = HEXAGRAMS; 
    

    let currentHexagram = rawHexagrams[0];
    
    function renderYaoLines(linesArr) {
      const container = document.getElementById('yaoContainer');
      container.innerHTML = '';
      const labels = ['初', '二', '三', '四', '五', '上'];
    
      for (let i = 0; i < linesArr.length; i++) {
        const val = linesArr[i];
        const yaoDiv = document.createElement('div');
        yaoDiv.className = 'yao';
    
        const lineDiv = document.createElement('div');
        lineDiv.className = 'line-group';
    
        if (val === 1) {
          const bar = document.createElement('div');
          bar.className = 'yang-line';
          bar.style.width = '156px';
          lineDiv.appendChild(bar);
        } else {
          const leftBar = document.createElement('div');
          leftBar.className = 'yin-line';
          const rightBar = document.createElement('div');
          rightBar.className = 'yin-line';
          lineDiv.appendChild(leftBar);
          lineDiv.appendChild(rightBar);
        }
    
        const labelSpan = document.createElement('span');
        labelSpan.className = 'line-label';
        labelSpan.innerText = labels[i];
    
        yaoDiv.appendChild(labelSpan);
        yaoDiv.appendChild(lineDiv);
        container.appendChild(yaoDiv);
      }
    }
    
    function updateUI(hex) {
        if(!hex) return;
        currentHexagram = hex;
        document.getElementById('symbolDisplay').innerText = hex.symbol;
        document.getElementById('hexName').innerHTML = `${hex.name}${hex.subname?' · '+hex.subname:''}`;
        document.getElementById('hexFullName').innerHTML = `${hex.num} · ${hex.name}卦`;
        document.getElementById('judgmentText').innerText = hex.judgment;
        document.getElementById('careerField').innerText = hex.career.slice(0, 32);
        document.getElementById('wealthField').innerText = hex.wealth.slice(0, 32);
        document.getElementById('loveField').innerText = hex.love.slice(0, 32);
        document.getElementById('luckValue').innerHTML = `${hex.luck} / 10 <i class="fas fa-star-of-life" style="font-size:0.7rem;"></i>`;
        document.getElementById('meaningText').innerHTML = `<i class="fas fa-feather-alt"></i> ${hex.meaning.substring(0,100)}...<br><small style="color:#cdb282">⚡ ${hex.warning}</small>`;
        renderYaoLines(hex.lines);
        // 動畫閃爍
        const card = document.getElementById('hexCard');
        card.classList.add('shine');
        setTimeout(()=>card.classList.remove('shine'), 400);
    }
    
    function randomHex() {
        const randIndex = Math.floor(Math.random() * rawHexagrams.length);
        const selected = rawHexagrams[randIndex];
        updateUI(selected);
    }
    
    function copyHexagram() {
        const hex = currentHexagram;
        const copyText = `《易經·${hex.num} ${hex.name}卦》${hex.symbol}\n卦辭：${hex.judgment}\n寓意：${hex.meaning}\n事業：${hex.career}\n財富：${hex.wealth}\n感情：${hex.love}\n氣運指數：${hex.luck}/10\n警句：${hex.warning}`;
        navigator.clipboard.writeText(copyText).then(()=>{
            const toast = document.getElementById('toastMsg');
            toast.classList.add('show');
            setTimeout(()=>toast.classList.remove('show'), 2000);
        }).catch(()=>alert('複製失敗，手動亦可'));
    }
    
    document.getElementById('randomBtn').addEventListener('click', randomHex);
    document.getElementById('copyBtn').addEventListener('click', copyHexagram);
    // 初次渲染預設第一卦
    if(rawHexagrams.length) updateUI(rawHexagrams[0]);
    else console.warn("卦象數據缺失");
